<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a0a14;font-family:'Georgia',serif;}
  #root{width:100%;height:100%;display:flex;flex-direction:column;}

  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  @keyframes wrongPop{0%{opacity:1;transform:scale(1) translate(-50%,-50%)}100%{opacity:0;transform:scale(2.5) translate(-50%,-50%)}}
  @keyframes glow{0%,100%{box-shadow:0 0 20px #F4C842}50%{box-shadow:0 0 40px #F4C842,0 0 60px #F4C842}}
  @keyframes popIn{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
  @keyframes glowRing{0%,100%{box-shadow:0 0 0 4px #F4C84266}50%{box-shadow:0 0 0 10px #F4C84222,0 0 30px #F4C842}}

  .char{position:absolute;transform:translate(-50%,-50%);cursor:pointer;transition:transform 0.15s;touch-action:manipulation;z-index:6;}
  .char:hover{transform:translate(-50%,-50%) scale(1.1);}
  .char:active{transform:translate(-50%,-50%) scale(0.95);}
  .decoy{z-index:5;}
  .btn{border:none;cursor:pointer;font-family:'Georgia',serif;font-weight:900;letter-spacing:0.04em;transition:transform 0.15s,box-shadow 0.15s;}
  .btn:hover{transform:scale(1.05);}
  .btn:active{transform:scale(0.97);}
  .btn-gold{background:linear-gradient(135deg,#F4C842,#E8A800);color:#1a0a00;border-radius:50px;padding:16px 52px;font-size:18px;}
  .btn-ghost{background:rgba(255,255,255,0.07);color:#aaa;border:1px solid rgba(255,255,255,0.12);border-radius:50px;padding:12px 32px;font-size:15px;}
  .screen{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow:auto;}
  .hud{background:rgba(0,0,0,0.88);backdrop-filter:blur(10px);padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;flex-wrap:wrap;}
  .arena{flex:1;position:relative;overflow:hidden;min-height:0;}
  .tip{background:rgba(0,0,0,0.9);padding:7px 16px;font-size:11px;color:#444;text-align:center;flex-shrink:0;}
  .hint-desc{background:rgba(244,200,66,0.07);padding:7px 16px;font-size:12px;color:#a0a0b0;text-align:center;border-bottom:1px solid rgba(255,255,255,0.04);flex-shrink:0;}

// DECORATION RENDERER
// ═══════════════════════════════════════════════════════════════════════════
function renderDecoration(dec, i){
  const {type,x,y} = dec;
  const base = `position:absolute;left:${x}%;top:${y}%;pointer-events:none;`;
  if(type==='bubble') return `<div style="${base}width:${dec.r*2}px;height:${dec.r*2}px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.4);"></div>`;
  if(type==='seaweed') return `<svg style="${base}" width="14" height="30" viewBox="0 0 14 30"><path d="M7 30 Q2 22 7 15 Q12 8 7 0" stroke="#2ecc71" stroke-width="3" fill="none" stroke-linecap="round"/></svg>`;
  if(type==='fish') return `<svg style="${base}" width="28" height="14" viewBox="0 0 28 14"><ellipse cx="14" cy="7" rx="11" ry="5" fill="#FF8C00" opacity="0.7"/><polygon points="3,3 0,7 3,11" fill="#FF8C00" opacity="0.7"/></svg>`;
  if(type==='coral') return `<svg style="${base}" width="24" height="18" viewBox="0 0 24 18"><path d="M12 18 L12 8 M12 12 L8 6 M12 10 L16 4" stroke="#FF6B6B" stroke-width="3" stroke-linecap="round"/></svg>`;
  if(type==='neon') return `<div style="${base}background:rgba(255,0,255,0.15);border:1px solid rgba(255,0,255,0.6);color:#ff00ff;font-size:10px;font-family:monospace;font-weight:900;padding:2px 6px;border-radius:3px;text-shadow:0 0 6px #ff00ff;white-space:nowrap;">${dec.label}</div>`;
  if(type==='window') return `<div style="${base}width:16px;height:20px;background:rgba(255,200,100,0.25);border:1px solid rgba(255,200,100,0.5);border-radius:2px;"></div>`;
  if(type==='star') return `<svg style="${base}" width="14" height="14" viewBox="0 0 12 12"><polygon points="6,0 7.5,4.5 12,4.5 8.5,7.5 9.5,12 6,9 2.5,12 3.5,7.5 0,4.5 4.5,4.5" fill="gold" opacity="0.7"/></svg>`;
  if(type==='flower'){
    let petals='';
    [0,60,120,180,240,300].forEach(a=>{
      const rad=a*Math.PI/180;
      const cx=9+4*Math.cos(rad), cy=9+4*Math.sin(rad);
      petals+=`<ellipse cx="${cx}" cy="${cy}" rx="3" ry="5" fill="#FF69B4" opacity="0.8" transform="rotate(${a} ${cx} ${cy})"/>`;
    });
    return `<svg style="${base}" width="18" height="18" viewBox="0 0 18 18">${petals}<circle cx="9" cy="9" r="3" fill="#FFD700"/></svg>`;
  }
  if(type==='cloud') return `<svg style="${base}" width="50" height="22" viewBox="0 0 50 22"><ellipse cx="25" cy="15" rx="20" ry="10" fill="white" opacity="0.85"/><ellipse cx="17" cy="13" rx="12" ry="9" fill="white" opacity="0.85"/><ellipse cx="35" cy="12" rx="13" ry="10" fill="white" opacity="0.85"/></svg>`;
  if(type==='tree') return `<svg style="${base}" width="28" height="50" viewBox="0 0 28 50"><rect x="11" y="35" width="6" height="15" fill="#8B4513"/><ellipse cx="14" cy="25" rx="13" ry="20" fill="#228B22"/></svg>`;
  if(type==='sun'){let rays='';[0,45,90,135,180,225,270,315].forEach(a=>{const r=a*Math.PI/180;rays+=`<line x1="${16+11*Math.cos(r)}" y1="${16+11*Math.sin(r)}" x2="${16+15*Math.cos(r)}" y2="${16+15*Math.sin(r)}" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>`;});return `<svg style="${base}" width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="9" fill="#FFD700"/>${rays}</svg>`;}
  if(type==='tent') return `<svg style="${base}" width="50" height="35" viewBox="0 0 50 35"><polygon points="25,0 0,35 50,35" fill="#E74C3C" opacity="0.8"/><polygon points="25,0 12,35 38,35" fill="#C0392B" opacity="0.8"/></svg>`;
  if(type==='balloon'){const colors=['#FF6B6B','#4ECDC4','#FFD93D','#6BCB77'];const c=colors[Math.floor(x)%4];return `<svg style="${base}" width="20" height="28" viewBox="0 0 20 28"><ellipse cx="10" cy="10" rx="9" ry="11" fill="${c}"/><line x1="10" y1="21" x2="10" y2="28" stroke="#888" stroke-width="1"/></svg>`;}
  if(type==='light'){const colors=['#ff6b6b','#ffd93d','#6bcb77','#4ecdc4'];const c=colors[Math.floor(x/25)%4];return `<div style="${base}width:8px;height:8px;border-radius:50%;background:${c};box-shadow:0 0 8px ${c};"></div>`;}
  if(type==='snowflake'){let lines='';[0,60,120].forEach(a=>{const r=a*Math.PI/180;lines+=`<line x1="${8+7*Math.cos(r)}" y1="${8+7*Math.sin(r)}" x2="${8-7*Math.cos(r)}" y2="${8-7*Math.sin(r)}" stroke="white" stroke-width="1.5" opacity="0.7"/>`;});return `<svg style="${base}" width="16" height="16" viewBox="0 0 16 16">${lines}</svg>`;}
  if(type==='mountain') return `<svg style="${base}opacity:0.55" width="80" height="50" viewBox="0 0 80 50"><polygon points="40,0 0,50 80,50" fill="white"/><polygon points="40,0 28,20 52,20" fill="#cce0ff"/></svg>`;
  if(type==='pine') return `<svg style="${base}" width="22" height="40" viewBox="0 0 22 40"><rect x="9" y="30" width="4" height="10" fill="#8B4513"/><polygon points="11,0 0,20 22,20" fill="#2E8B57"/><polygon points="11,10 1,28 21,28" fill="#2E8B57"/></svg>`;
  return '';
}

      {type:'pine',x:5,y:72},{type:'pine',x:32,y:75},{type:'pine',x:90,y:70},
    ]
  }
];

const DISGUISE_NAMES = {hat:'Top Hat',sunglasses:'Sunglasses',mustache:'Mustache',bow:'Cute Bow',mask:'Face Mask',none:'No disguise'};

// ═══════════════════════════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════════════════════════
const G = {
  state:'menu', // menu | playing | found | complete
  scene:0, score:0, timeLeft:45, hintsLeft:3,
  showHint:false, totalTime:0, wrongClicks:0,
  timer:null, hintTimer:null,
};

function render(){ document.getElementById('root').innerHTML = buildHTML(); bindEvents(); }

function buildHTML(){
  if(G.state==='menu')    return buildMenu();
  if(G.state==='playing') return buildPlaying();
  if(G.state==='found')   return buildFound();
  if(G.state==='complete')return buildComplete();
}

// ─── MENU ─────────────────────────────────────────────────────────────────

  return `
  <div class="screen" style="background:linear-gradient(135deg,#1a0535,#0d2a4a,#1a3d2a);min-height:100vh;">
    <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none;">
      ${[{x:10,y:10,s:50,d:1.8},{x:80,y:20,s:40,d:2.3},{x:20,y:75,s:60,d:2.1},{x:75,y:70,s:45,d:1.9},{x:50,y:40,s:35,d:2.5}].map((b,i)=>`
        <div style="position:absolute;left:${b.x}%;top:${b.y}%;opacity:0.07;animation:float ${b.d}s ease-in-out infinite;animation-delay:${i*0.4}s;">

    <div style="animation:float 2.5s ease-in-out infinite;margin-bottom:16px;position:relative;">
      ${pombonSVG(100,'sunglasses')}

    <h1 style="font-size:clamp(28px,8vw,56px);color:#F4C842;margin:0 0 6px;font-weight:900;text-shadow:0 0 30px #F4C84266;letter-spacing:-1px;text-align:center;animation:fadeUp 0.6s ease;">
      Find Pombon!
    </h1>
    <p style="color:#a0c8e0;font-size:15px;margin:0 0 8px;text-align:center;max-width:340px;line-height:1.6;animation:fadeUp 0.7s ease;">
      Pombon is hiding in disguise across <strong style="color:#F4C842;">5 wild scenes</strong>.<br>
      Click the real Pombon before time runs out! 🔍
    </p>
    <div style="color:#F9A8C9;font-size:13px;margin-bottom:28px;font-style:italic;">Pombon wears a new disguise every scene!</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:32px;max-width:340px;width:100%;animation:fadeUp 0.8s ease;">
      ${[['⏱️','45 sec','Per scene'],['💡','3 hints','Per game'],['🎯','Accuracy','Affects score']].map(([e,t,d])=>`
        <div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:14px 8px;text-align:center;">

          <div style="font-size:12px;font-weight:700;color:#F4C842;">${t}</div>
          <div style="font-size:11px;color:#555;margin-top:2px;">${d}</div>
        </div>`).join('')}
    </div>
    <button id="btn-start" class="btn btn-gold" style="animation:fadeUp 0.9s ease;">🔍 Start Hunting!</button>
    <div style="margin-top:20px;display:flex;gap:8px;opacity:0.5;">
      ${SCENES.map(s=>`<span style="font-size:18px;">${s.name.split(' ')[0]}</span>`).join('')}
    </div>
    <p style="color:#333;font-size:12px;margin-top:12px;">${SCENES.length} scenes · Tap any character to guess</p>
  </div>`;
}

// ─── PLAYING ──────────────────────────────────────────────────────────────
function buildPlaying(){
  const sc = SCENES[G.scene];
  const timerPct = (G.timeLeft/45)*100;
  const timerColor = timerPct>60?'#4ade80':timerPct>30?'#fbbf24':'#f87171';
  const arenaStyle = G.shaking ? 'animation:shake 0.4s ease;' : '';

  let chars = '';
  // Decoys
  sc.decoys.forEach((d,i)=>{
    chars += `<div class="char decoy" id="decoy-${i}" data-decoy="1"
      style="left:${d.x}%;top:${d.y}%;">
      ${DECOYS[d.fn](d.size)}
    </div>`;
  });
  // Pombon
  chars += `<div class="char" id="pombon"
    style="left:${sc.pombon.x}%;top:${sc.pombon.y}%;z-index:6;${G.showHint?'animation:glowRing 0.6s ease-in-out infinite;border-radius:50%;':''}"
    data-pombon="1">
    ${pombonSVG(sc.pombon.size, sc.pombon.disguise)}
    ${G.showHint?`<div style="position:absolute;inset:-12px;border-radius:50%;border:3px solid #F4C842;box-shadow:0 0 24px #F4C842;pointer-events:none;animation:glowRing 0.6s ease-in-out infinite;"></div>`:''}
  </div>`;

  return `
  <div id="game-wrap" style="width:100%;height:100%;display:flex;flex-direction:column;">
    <div class="hud">
      <div style="font-size:13px;font-weight:700;color:#F4C842;white-space:nowrap;">${sc.name}</div>
      <div style="flex:1;background:#1a1a2e;border-radius:20px;height:8px;overflow:hidden;min-width:60px;">
        <div style="width:${timerPct}%;height:100%;background:${timerColor};transition:width 1s linear;border-radius:20px;box-shadow:0 0 8px ${timerColor};"></div>
      </div>
      <div style="font-size:15px;font-weight:900;color:${timerColor};min-width:32px;text-align:right;">${G.timeLeft}s</div>
      <div style="font-size:13px;color:#888;">🎯 <span style="color:#F4C842;font-weight:700;">${G.score}</span></div>
      <button id="btn-hint" class="btn" style="background:${G.hintsLeft>0?'rgba(244,200,66,0.15)':'rgba(80,80,80,0.1)'};color:${G.hintsLeft>0?'#F4C842':'#444'};border:1px solid ${G.hintsLeft>0?'#F4C84244':'#222'};padding:5px 12px;border-radius:20px;font-size:12px;" ${G.hintsLeft<=0||G.showHint?'disabled':''}>
        💡 ${G.hintsLeft}
      </button>
      <div style="font-size:12px;color:#555;">${G.scene+1}/${SCENES.length}</div>
    </div>
    <div class="hint-desc">${sc.desc}</div>
    <div class="arena" id="arena" style="background:${sc.bg};${arenaStyle}">
      ${sc.decs.map((d,i)=>renderDecoration(d,i)).join('')}
      ${chars}
    </div>
    <div class="tip">Tap a character · ❌ = wrong · 💡 = 2s glow hint · Yellow ears = Pombon!</div>
  </div>`;
}

// ─── FOUND ────────────────────────────────────────────────────────────────
function buildFound(){
  const sc = SCENES[G.scene];
  const isLast = G.scene >= SCENES.length-1;
  return `
  <div class="screen" style="background:linear-gradient(135deg,#1a0535,#0d2a4a);min-height:100vh;">
    <div style="animation:float 2s ease-in-out infinite,glow 1.5s ease-in-out infinite;margin-bottom:16px;">
      ${pombonSVG(100,sc.pombon.disguise)}
    </div>
    <h2 style="font-size:clamp(24px,7vw,44px);color:#4ade80;margin:0 0 8px;font-weight:900;text-align:center;text-shadow:0 0 20px #4ade8066;animation:popIn 0.5s ease;">
      You found Pombon! ✨
    </h2>
    <p style="color:#a0c8e0;margin-bottom:6px;text-align:center;">
      Pombon was hiding in <strong style="color:#F4C842;">${sc.name}</strong>
    </p>
    <p style="color:#777;font-size:13px;margin-bottom:28px;text-align:center;">
      Disguise: <strong style="color:#F4C842;">${DISGUISE_NAMES[sc.pombon.disguise]}</strong>
    </p>
    <div style="background:rgba(74,222,128,0.1);border:2px solid rgba(74,222,128,0.3);border-radius:20px;padding:20px 40px;text-align:center;margin-bottom:28px;animation:popIn 0.6s ease;">
      <div style="font-size:42px;font-weight:900;color:#4ade80;">${G.score.toLocaleString()}</div>
      <div style="color:#555;font-size:13px;margin-bottom:12px;">Score so far</div>
      <div style="display:flex;gap:24px;justify-content:center;">
        <div><div style="color:#F4C842;font-weight:700;">${G.scene+1}/${SCENES.length}</div><div style="color:#555;font-size:11px;">Scenes</div></div>
        <div><div style="color:#F4C842;font-weight:700;">${G.totalTime}s</div><div style="color:#555;font-size:11px;">Time used</div></div>
        <div><div style="color:${G.wrongClicks>0?'#f87171':'#4ade80'};font-weight:700;">${G.wrongClicks}</div><div style="color:#555;font-size:11px;">Wrong clicks</div></div>
      </div>
    </div>
    ${isLast
      ? `<button id="btn-complete" class="btn" style="background:linear-gradient(135deg,#4ade80,#22c55e);color:#fff;padding:14px 44px;border-radius:50px;font-size:16px;">See Final Score 🏆</button>`
      : `<button id="btn-next" class="btn btn-gold">Next Scene →</button>`
    }
  </div>`;
}

// ─── COMPLETE ─────────────────────────────────────────────────────────────
function buildComplete(){
  const rating = G.wrongClicks===0?'🌟 Perfect!':G.wrongClicks<5?'⭐ Great!':G.wrongClicks<10?'👍 Good!':'😅 Keep practising!';
  return `
  <div class="screen" style="background:linear-gradient(135deg,#1a0535,#0d2a4a);min-height:100vh;">
    <div style="animation:float 2s ease-in-out infinite;margin-bottom:16px;">
      ${pombonSVG(110,'none')}
    </div>
    <h1 style="font-size:clamp(26px,7vw,50px);color:#F4C842;margin:0 0 6px;font-weight:900;text-align:center;text-shadow:0 0 30px #F4C84266;">
      You caught them all! 🎉
    </h1>
    <p style="color:#a0c8e0;margin-bottom:8px;text-align:center;">Pombon's disguises were no match for you!</p>
    <div style="font-size:24px;margin-bottom:24px;">${rating}</div>
    <div style="background:rgba(244,200,66,0.1);border:2px solid #F4C84266;border-radius:20px;padding:24px 40px;text-align:center;margin-bottom:28px;">
      <div style="font-size:52px;font-weight:900;color:#F4C842;">${G.score.toLocaleString()}</div>
      <div style="color:#888;font-size:14px;margin-bottom:16px;">TOTAL SCORE</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;">
        ${[['🎬',SCENES.length,'Scenes'],['⏱️',G.totalTime+'s','Total time'],['❌',G.wrongClicks,'Wrong clicks']].map(([e,v,l])=>`
          <div><div style="font-size:20px;">${e}</div><div style="color:#F4C842;font-weight:700;font-size:18px;">${v}</div><div style="color:#555;font-size:11px;">${l}</div></div>`).join('')}
      </div>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
      <button id="btn-restart" class="btn btn-gold">🔄 Play Again</button>
      <button id="btn-share" class="btn btn-ghost">📤 Share Score</button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════════════
// EVENTS & GAME LOGIC
// ═══════════════════════════════════════════════════════════════════════════
function bindEvents(){
  const q = id => document.getElementById(id);

  if(G.state==='menu'){
    q('btn-start')&&q('btn-start').addEventListener('click', startGame);
  }
  if(G.state==='playing'){
    q('btn-hint')&&q('btn-hint').addEventListener('click', useHint);
    document.querySelectorAll('[data-pombon]').forEach(el=>el.addEventListener('click', foundPombon));
    document.querySelectorAll('[data-decoy]').forEach(el=>el.addEventListener('click', wrongClick));
  }
  if(G.state==='found'){
    q('btn-next')&&q('btn-next').addEventListener('click', nextScene);
    q('btn-complete')&&q('btn-complete').addEventListener('click',()=>{G.state='complete';render();});
  }
  if(G.state==='complete'){
    q('btn-restart')&&q('btn-restart').addEventListener('click', startGame);
    q('btn-share')&&q('btn-share').addEventListener('click', shareScore);
  }
}

function startGame(){
  clearInterval(G.timer);
  G.state='playing'; G.scene=0; G.score=0; G.totalTime=0;
  G.timeLeft=45; G.hintsLeft=3; G.wrongClicks=0; G.showHint=false; G.shaking=false;
  render(); startTimer();
}

function startTimer(){
  clearInterval(G.timer);
  G.timer = setInterval(()=>{
    G.timeLeft--;
    G.totalTime++;
    if(G.timeLeft<=0){
      clearInterval(G.timer);
      G.shaking=true; render();
      setTimeout(()=>{ G.shaking=false; advanceScene(false); },700);
    } else { updateHUD(); }
  },1000);
}

function updateHUD(){
  const timerPct = (G.timeLeft/45)*100;
  const timerColor = timerPct>60?'#4ade80':timerPct>30?'#fbbf24':'#f87171';
  const bar = document.querySelector('.hud .arena-timer-bar');
  const num = document.querySelector('.hud .timer-num');
  // Just re-render HUD elements cheaply
  const hud = document.querySelector('.hud');
  if(!hud) return;
  const timeEl = hud.querySelector('[data-timer]');
  const barEl  = hud.querySelector('[data-bar]');
  if(timeEl) timeEl.textContent = G.timeLeft+'s';
  if(barEl)  { barEl.style.width=timerPct+'%'; barEl.style.background=timerColor; barEl.style.boxShadow=`0 0 8px ${timerColor}`; }
  // Fallback full re-render every 5s
}

function foundPombon(e){
  e.stopPropagation();
  clearInterval(G.timer);
  const timeBonus = Math.floor(G.timeLeft*2);
  const hintPenalty = (3-G.hintsLeft)*15;
  const wrongPenalty = G.wrongClicks*10;
  const pts = Math.max(50, 200+timeBonus-hintPenalty-wrongPenalty);
  G.score += pts;
  G.state='found';
  render();
}

function wrongClick(e){
  e.stopPropagation();
  G.wrongClicks++;
  // Flash red effect
  const el = e.currentTarget;
  const orig = el.style.filter||'';
  el.style.filter='drop-shadow(0 0 12px #f87171)';
  // Pop ❌
  const pop = document.createElement('div');
  pop.textContent='❌';
  pop.style.cssText=`position:fixed;left:${e.clientX}px;top:${e.clientY}px;font-size:24px;pointer-events:none;z-index:9999;animation:wrongPop 0.6s ease forwards;transform:translate(-50%,-50%)`;
  document.body.appendChild(pop);
  setTimeout(()=>{el.style.filter=orig; pop.remove();},650);
}

function useHint(){
  if(G.hintsLeft<=0||G.showHint) return;
  G.hintsLeft--;
  G.showHint=true;
  render(); startTimer();
  G.hintTimer=setTimeout(()=>{G.showHint=false; render(); startTimer();},2000);
}

function advanceScene(success){
  if(G.scene>=SCENES.length-1){ G.state='complete'; render(); return; }
  G.scene++;
  G.timeLeft=45; G.showHint=false; G.state='playing';
  render(); startTimer();
}

function nextScene(){
  clearInterval(G.timer);
  advanceScene(true);
}

function shareScore(){
  const text=`🔍 I found all 5 Pombons and scored ${G.score.toLocaleString()} points!\n\nCan you beat me? Try it here 👇\n\n#FindPombon #Pokémon`;
  if(navigator.share){
    navigator.share({title:'Find Pombon!',text,url:location.href}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text+'\n\n'+location.href).then(()=>{
      alert('Score copied to clipboard! Paste it on Twitter 🐦');
    }).catch(()=>alert('Share this link:\n'+location.href));
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════════════════
render();
</script>
